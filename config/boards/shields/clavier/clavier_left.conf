# ==========================================================================
# Clavier - マイコン（Seeed Studio XIAO nRF52840）システム機能設定
# ==========================================================================
# 💡 このファイルの極意：
# マイコンのピンの中には、電源を入れた瞬間に「Bluetoothログ出力用」や「NFCアンテナ用」
# としてシステムが自動的に占有（ロック）してしまうピンがあります。
# このファイルでは、それらの余計な機能をオフにして、すべてのピンを「キースイッチ用（GPIO）」
# として強制的に奪い返し、目覚めさせるための重要な指令を出しています。
# ==========================================================================

# --------------------------------------------------------------------------
# 1. 分割キーボード・Bluetooth 基本接続設定
# --------------------------------------------------------------------------
# 分割キーボード（Split）機能を有効にします
CONFIG_ZMK_SPLIT=y

# 左右のキーボード間をBluetooth（BLE）で無線通信させます
CONFIG_ZMK_SPLIT_BLE=y

# USBデバイスとしての動作を有効にします
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y

# Bluetoothの電波強度を最強（+8dBm）に設定し、左右の接続やPCとの接続を安定させます
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# バッテリー残量をPC側に報告する機能を有効にします
CONFIG_ZMK_BATTERY_REPORTING=y

# --------------------------------------------------------------------------
# 2. 省電力・スリープタイマー設定
# --------------------------------------------------------------------------
# 30秒間キー入力がない場合、キーボードを「アイドル状態（省電力）」にします（30000ミリ秒）
CONFIG_ZMK_IDLE_TIMEOUT=30000

# より深い「スリープ状態（超省電力）」への移行を許可します
CONFIG_ZMK_SLEEP=y

# 15分間キー入力がない場合、完全にスリープさせてバッテリー消費をほぼゼロにします（900000ミリ秒）
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# --------------------------------------------------------------------------
# 3. Windows / Mac との接続安定化パラメータ（BLE接続の最適化）
# --------------------------------------------------------------------------
# ペアリング情報の競合が起きた際、古い情報を上書きしてスムーズに再接続できるようにします
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y

# 以下はPCとの通信間隔（インターバル）を極限まで狭め、入力遅延（レイテンシ）を
# 最小限に抑えつつ接続を維持するためのZMK推奨値です
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_ACL_RX_COUNT=10

# --------------------------------------------------------------------------
# 4. ★★★ 【超重要】隠れたピンの解放指令（キースキャンを正常化する核心） ★★★
# --------------------------------------------------------------------------

# 【対策A】NFCアンテナピンの解放
# P0.10（左手側のCol0）は、初期状態では「NFC（近距離無線通信）」のアンテナピンとして
# マイコンがロックしています。これを「y（イエス）」にすることで、ロックを解除し、
# 通常のキースイッチが反応する一般GPIOピンとして解放します。
CONFIG_NFCT_PINS_AS_GPIOS=y

# 【対策B】UART（シリアル通信）ドライバの完全停止
# P1.11（Row3）と P1.12（左Col1 / 右Col2）は、マイコンの「有線シリアルログ出力機能」が
# 自動的に引きこもって占有しています。これがONのままだと、キースキャンと信号が激突して
# キーが暴発したり無反応になったりします。
# ZMKはPCへのログ出力をUSB（CDC ACM）経由で行うため、この有線シリアル機能は一切不要です。
# 以下の2行を「n（ノー）」にすることで、シリアルドライバを完全に眠らせ、
# P1.11 と P1.12 をピュアなキースイッチ用ピンとして100%目覚めさせます。
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n
