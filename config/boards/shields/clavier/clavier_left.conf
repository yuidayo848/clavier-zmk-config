# ==========================================================================
# Clavier - マイコン（Seeed Studio XIAO nRF52840）システム機能設定
# ==========================================================================
# 💡 このファイルの極意：
# マイコンのピンの中には、電源を入れた瞬間に「Bluetoothログ出力用」や「NFCアンテナ用」
# としてシステムが自動的に占有（ロック）してしまうピンがあります。
# このファイルでは、それらの余計な機能をオフにして、すべてのピンを「キースイッチ用（GPIO）」
# として強制的に奪い返し、目覚めさせるための重要な指令を出しています。
# ==========================================================================

# --------------------------------------------------------------------------
# 1. 分割キーボード・Bluetooth 基本接続設定
# --------------------------------------------------------------------------
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_ZMK_USB=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BATTERY_REPORTING=y

# --------------------------------------------------------------------------
# 2. 省電力・スリープタイマー設定
# --------------------------------------------------------------------------
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# --------------------------------------------------------------------------
# 3. Windows / Mac との接続安定化パラメータ（BLE接続の最適化）
# --------------------------------------------------------------------------
CONFIG_BT_SMP_ALLOW_UNAUTH_OVERWRITE=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_BUF_ACL_RX_COUNT=10

# --------------------------------------------------------------------------
# 4. ★★★ 【超重要】隠れたピンの解放指令（キースキャンを正常化する核心） ★★★
# --------------------------------------------------------------------------
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_SERIAL=n
CONFIG_UART_CONSOLE=n

# --------------------------------------------------------------------------
# 5. ★★★ トラックボール（PMW3610）制御設定 ★★★
# --------------------------------------------------------------------------
# マウス機能の有効化
CONFIG_ZMK_MOUSE=y

# SPI通信の有効化
CONFIG_SPI=y

# PMW3610センサー用ドライバーの有効化（名称をZMK_PMW3610へ変更）
CONFIG_ZMK_PMW3610=y
